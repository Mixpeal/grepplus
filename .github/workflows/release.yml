name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ort has no prebuilt for x86_64-apple-darwin; ship aarch64 macOS only.
          - os: macos-15
            target: aarch64-apple-darwin
            asset: grepplus-aarch64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: grepplus-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: grepplus-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binaries
        run: cargo build --release -p grepplus --target ${{ matrix.target }}
      - name: Package tarball (unix)
        if: runner.os != 'Windows'
        run: |
          dest="grepplus-${{ matrix.target }}"
          mkdir -p "$dest"
          cp "target/${{ matrix.target }}/release/grepplus" "$dest/"
          cp "target/${{ matrix.target }}/release/gp" "$dest/"
          tar czf "${{ matrix.asset }}" -C "$dest" .
      - name: Package zip (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = "grepplus-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/grepplus.exe" "$dest/"
          Copy-Item "target/${{ matrix.target }}/release/gp.exe" "$dest/"
          Compress-Archive -Path "$dest/*" -DestinationPath "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
