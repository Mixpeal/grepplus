name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: grepplus-aarch64-apple-darwin.tar.gz
            optional: false
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: grepplus-x86_64-apple-darwin.tar.gz
            optional: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: grepplus-x86_64-unknown-linux-gnu.tar.gz
            optional: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.optional }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binaries
        run: cargo build --release -p gp-cli --target ${{ matrix.target }}
      - name: Package tarball
        run: |
          dest="grepplus-${{ matrix.target }}"
          mkdir -p "$dest"
          cp "target/${{ matrix.target }}/release/grepplus" "$dest/"
          cp "target/${{ matrix.target }}/release/gp" "$dest/"
          tar czf "${{ matrix.asset }}" -C "$dest" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  github-release:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
